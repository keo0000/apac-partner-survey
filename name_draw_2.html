<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Draw · APAC Content Offsite 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0A0A0A; --surface: #141414; --border: #222222;
    --text: #FFFFFF; --text-dim: #888888; --text-mid: #BBBBBB;
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 3rem; text-align: center; }
  .stage { text-align: center; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 3rem; width: 100%; max-width: 640px; }
  .group-tag { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); height: 1.2rem; }
  .name-display { font-family: var(--serif); font-size: clamp(2rem, 6vw, 3.8rem); font-weight: 400; color: var(--text); min-height: 5rem; display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.1; transition: color 0.15s; padding: 0 1rem; }
  .name-display.spinning { color: var(--text-dim); font-style: italic; font-size: clamp(1.2rem, 3vw, 1.6rem); }
  .name-display.idle { color: var(--text-dim); font-style: italic; font-size: clamp(1.2rem, 3vw, 1.8rem); }
  .name-display.done-label { font-style: italic; color: var(--text-mid); font-size: clamp(1.5rem, 4vw, 2.5rem); }
  .pick-counter { font-size: 12px; color: var(--text-dim); height: 1.2rem; letter-spacing: 0.05em; }
  .divider { width: 40px; height: 1px; background: var(--border); margin: 0 auto 3rem; }
  .results { display: none; gap: 1.5rem; justify-content: center; flex-wrap: wrap; width: 100%; max-width: 720px; margin-bottom: 3rem; }
  .result-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 16px; padding: 1.5rem 2rem; min-width: 240px; flex: 1; }
  .result-card-header { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 0.5px solid var(--border); }
  .result-name { font-family: var(--serif); font-size: 18px; font-weight: 400; color: var(--text); padding: 0.4rem 0; line-height: 1.3; }
  .btn-row { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
  .btn { font-family: var(--sans); font-size: 14px; font-weight: 500; padding: 0.65rem 1.75rem; border-radius: 100px; border: 0.5px solid #444; background: transparent; color: var(--text); cursor: pointer; letter-spacing: 0.02em; transition: background 0.15s, border-color 0.15s; }
  .btn:hover { background: #1a1a1a; border-color: #666; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); font-size: 15px; padding: 0.75rem 2.5rem; }
  .btn.primary:hover { background: #EEEEEE; border-color: #EEEEEE; }
</style>
</head>
<body>
<p class="eyebrow">APAC Content Offsite · Bangkok 2026</p>
<div class="stage">
  <div class="group-tag" id="group-tag"></div>
  <div class="name-display idle" id="name-display">Ready to draw</div>
  <div class="pick-counter" id="pick-counter"></div>
</div>
<div class="divider"></div>
<div class="results" id="results"></div>
<div class="btn-row">
  <button class="btn primary" id="draw-btn" onclick="startDraw()">Draw</button>
  <button class="btn" id="reset-btn" onclick="reset()" style="display:none">Draw again</button>
</div>
<script>
const names = [
  "Keisuke Hishida","Minju Kim","Mina Baek","Vitto Lazatin","Janslle Ong",
  "Maya Huang","Paipan Chanpech","Kijae Kim","Ayami Nakada","Ayana Maki",
  "Jae Hee Yun","Emily O'Connell","Johannes Christian","Luis Diokno","My Satrawaha",
  "Shinichi Takahashi","Jun Park","Hidenaga Katakami","Jinsol Kim","Jimin Choi",
  "Katherine Slattery","Bene Mendoza","Joanne Lee","Michelle Kuo","Kwang Kanjanapisal",
  "Hanna Moon","Shoko Otani","Hyeonju Lee","Min Young Oh","Wooyeon Yang",
  "Jaka Saputra","Ned Saicheua","Ema Hirayama","Keisuke Ariga","Jae Park",
  "Hyewon Hahn","Malobika Banerji","Chanikarn Tangnoi","Kihwan Yoo","Isabelle Huang",
  "Kento Kawasho","Juhyun Lee","Liang-Chun Lin","Abishek Jirathaneswongse","Yuji Yamano",
  "Kaata Sakamoto","Gabrielle Jung","Jin Lee","Pop Saksucharit","Makiko Okano",
  "Leia Gorman","Rie Sawaoka","Taewon Kim","Lintang Wardhani","Komin Aoudomphan"
];
let groupA=[],groupB=[],drawing=false;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startDraw(){
  if(drawing)return;drawing=true;
  document.getElementById('draw-btn').disabled=true;
  document.getElementById('results').style.display='none';
  document.getElementById('results').innerHTML='';
  const pool=shuffle(names);groupA=pool.slice(0,5);groupB=pool.slice(5,10);
  const allPicks=[...groupA.map((n,i)=>({name:n,group:'A',idx:i+1})),...groupB.map((n,i)=>({name:n,group:'B',idx:i+1}))];
  let step=0;
  const display=document.getElementById('name-display');
  const tag=document.getElementById('group-tag');
  const counter=document.getElementById('pick-counter');
  function revealNext(){
    if(step>=allPicks.length){showResults();return;}
    const pick=allPicks[step];
    tag.textContent=`Group ${pick.group}`;counter.textContent=`Pick ${pick.idx} of 5`;
    display.className='name-display spinning';display.textContent='· · ·';
    let ticks=0;const total=14+Math.floor(Math.random()*6);
    const spin=setInterval(()=>{
      display.textContent=names[Math.floor(Math.random()*names.length)].split(' ')[0]+'…';
      ticks++;if(ticks>=total){clearInterval(spin);display.className='name-display';display.textContent=pick.name;step++;setTimeout(revealNext,1300);}
    },75);
  }
  revealNext();
}
function showResults(){
  const display=document.getElementById('name-display');
  display.className='name-display done-label';display.textContent='Done.';
  document.getElementById('group-tag').textContent='';document.getElementById('pick-counter').textContent='';
  const resultsEl=document.getElementById('results');resultsEl.style.display='flex';
  ['A','B'].forEach(g=>{
    const group=g==='A'?groupA:groupB;
    const card=document.createElement('div');card.className='result-card';
    card.innerHTML=`<div class="result-card-header">Group ${g}</div>`+group.map(n=>`<div class="result-name">${n}</div>`).join('');
    resultsEl.appendChild(card);
  });
  document.getElementById('draw-btn').style.display='none';document.getElementById('reset-btn').style.display='';
}
function reset(){
  groupA=[];groupB=[];drawing=false;
  const display=document.getElementById('name-display');
  display.className='name-display idle';display.textContent='Ready to draw';
  document.getElementById('group-tag').textContent='';document.getElementById('pick-counter').textContent='';
  document.getElementById('results').style.display='none';document.getElementById('results').innerHTML='';
  document.getElementById('draw-btn').disabled=false;document.getElementById('draw-btn').style.display='';
  document.getElementById('reset-btn').style.display='none';
}
</script>
</body>
</html>
